<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Mis envíos</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>
<body>

<div class="container mt-5">

<h2>Mis envíos</h2>

<table class="table table-bordered">

<thead>

<tr>

<th>ID</th>
<th>Fecha</th>
<th>Peso</th>
<th>Costo</th>
<th>Estado</th>

</tr>

</thead>

<tbody>

<tr th:each="e : ${listarEnvios}">

<td th:text="${e.idEnvio}"></td>
<td th:text="${e.fecha}"></td>
<td th:text="${e.peso}"></td>
<td th:text="${e.costo}"></td>
<td>

<span class="badge bg-warning"
      th:if="${e.estado=='REGISTRADO'}">
    Registrado
</span>

<span class="badge bg-primary"
      th:if="${e.estado=='EN_TRANSITO'}">
    En tránsito
</span>

<span class="badge bg-success"
      th:if="${e.estado=='ENTREGADO'}">
    Entregado
</span>

</td>

</tr>

</tbody>

</table>

<a href="/" class="btn btn-secondary">
Volver
</a>

</div>

</body>
</html>
