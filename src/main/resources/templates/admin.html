<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Panel de Administración - FeedExx</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#eef2f7;
    font-family:'Segoe UI',sans-serif;
}

/* ================= NAVBAR ================= */

.navbar{
    background:#4d148c;
    padding:15px;
}

.logo{
    color:white;
    font-size:30px;
    font-weight:bold;
    text-decoration:none;
}

.logo span{
    color:#ff6600;
}

.usuario{
    color:white;
    font-size:18px;
}

/* ================= TITULO ================= */

.titulo{
    text-align:center;
    margin-top:40px;
}

.titulo h2{
    font-weight:bold;
    color:#4d148c;
}

.titulo p{
    color:#666;
    font-size:18px;
}

/* ================= TARJETAS ================= */

.card-menu{

    border:none;

    border-radius:18px;

    transition:.30s;

    cursor:pointer;

    box-shadow:0px 4px 12px rgba(0,0,0,.12);

    height:180px;

}

.card-menu:hover{

    transform:translateY(-10px);

    box-shadow:0px 15px 25px rgba(0,0,0,.22);

}

.icono{

    font-size:60px;

}

.titulo-card{

    font-size:22px;

    font-weight:bold;

    margin-top:10px;

    color:#333;

}

.numero{

    font-size:34px;

    color:#4d148c;

    font-weight:bold;

}

/* ================= FOOTER ================= */

footer{

    margin-top:60px;

    padding:20px;

    text-align:center;

    color:#888;

}

</style>

</head>

<body>

<nav class="navbar">

<div class="container">

<a class="logo" th:href="@{/}">
Feed<span>Exx</span>
</a>

<div class="usuario">

Administrador:

<b th:text="${usuario.nombre}"></b>

|

<a th:href="@{/logout}" class="text-white text-decoration-none">
Cerrar sesión
</a>

</div>

</div>

</nav>

<div class="container">

<div class="titulo">

<h2>Panel de Administración</h2>

<p>Administra todo el sistema FeedExx desde un solo lugar.</p>

</div>

<div class="row g-4 mt-3">

<div class="col-lg-4 col-md-6">

<a th:href="@{/usuarios}" class="text-decoration-none">

<div class="card card-menu">

<div class="card-body text-center">

<div class="icono">👥</div>

<div class="titulo-card">Usuarios</div>

<div class="numero" th:text="${totalUsuarios}"></div>

</div>

</div>

</a>

</div>

<div class="col-lg-4 col-md-6">

<a th:href="@{/repartidores}" class="text-decoration-none">

<div class="card card-menu">

<div class="card-body text-center">

<div class="icono">🚚</div>

<div class="titulo-card">Repartidores</div>

<div class="numero" th:text="${totalRepartidores}"></div>

</div>

</div>

</a>

</div>

<div class="col-lg-4 col-md-6">

<a th:href="@{/ciudades}" class="text-decoration-none">

<div class="card card-menu">

<div class="card-body text-center">

<div class="icono">🌎</div>

<div class="titulo-card">Ciudades</div>

<div class="numero" th:text="${totalCiudades}"></div>

</div>

</div>

</a>

</div>

<div class="col-lg-4 col-md-6">

<a th:href="@{/rutas}" class="text-decoration-none">

<div class="card card-menu">

<div class="card-body text-center">

<div class="icono">🛣️</div>

<div class="titulo-card">Rutas</div>

<div class="numero" th:text="${totalRutas}"></div>

</div>

</div>

</a>

</div>

<div class="col-lg-4 col-md-6">

<a th:href="@{/admin/envios}" class="text-decoration-none">

<div class="card card-menu">

<div class="card-body text-center">

<div class="icono">📦</div>

<div class="titulo-card">Envíos</div>

<div class="numero" th:text="${totalEnvios}"></div>

</div>

</div>

</a>

</div>

<div class="col-lg-4 col-md-6">

<a th:href="@{/comprobantes}" class="text-decoration-none">

<div class="card card-menu">

<div class="card-body text-center">

<div class="icono">🧾</div>

<div class="titulo-card">Comprobantes</div>

<div class="numero" th:text="${totalComprobantes}"></div>

</div>

</div>

</a>

</div>

</div>

<footer>

Sistema FeedExx © 2026<br>

Proyecto de Ingeniería de Software

</footer>

</div>

</body>

</html>
