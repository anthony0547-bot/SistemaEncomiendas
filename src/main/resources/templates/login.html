<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesion - Feedexx</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; }
        .navbar-feedexx {
            background-color: #4d148c; /* morado estilo FedEx */
            padding: 18px 40px;
        }
        .navbar-feedexx .logo-feedexx {
            font-weight: 800;
            font-size: 1.6rem;
            color: #ffffff;
        }
        .navbar-feedexx .logo-feedexx span {
            color: #ff6600; /* naranja */
        }
        .login-box {
            max-width: 480px;
            margin: 70px auto;
        }
        .btn-naranja {
            background-color: #ff6600;
            border: none;
            color: white;
            font-weight: 700;
        }
        .btn-naranja:hover {
            background-color: #e65c00;
            color: white;
        }
    </style>
</head>
<body>

<nav class="navbar-feedexx d-flex align-items-center">
    <span class="logo-feedexx">Feed<span>exx</span></span>
</nav>

<div class="login-box">
    <h2 class="mb-4">Ingresa tu correo y tu contraseña para iniciar sesión.</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label fw-bold">Correo (ID de usuario)</label>
            <input type="email" class="form-control" name="correo" placeholder="correo@ejemplo.com" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Contraseña</label>
            <input type="password" class="form-control" name="contrasena" required>
        </div>
        <button type="submit" class="btn btn-naranja w-100 py-2 mt-3">INICIAR SESION</button>
    </form>

    <p class="text-center mt-4">
        ¿No tienes cuenta?
        <a th:href="@{/registro}">Crear una cuenta</a>
    </p>
</div>

</body>
</html>
