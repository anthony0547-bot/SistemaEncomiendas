<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Panel del Repartidor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
<body>

<h1 style="color:red">
ESTE ES MI PANEL NUEVO
</h1>

body{
    background:#f5f6fa;
    font-family:Segoe UI,sans-serif;
}

.navbar{
    background:#4d148c;
}

.logo{
    color:white;
    font-size:28px;
    font-weight:bold;
    text-decoration:none;
}

.logo span{
    color:#ff6600;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.table th{
    background:#4d148c;
    color:white;
    text-align:center;
}

.table td{
    text-align:center;
    vertical-align:middle;
}

</style>

</head>

<body>

<nav class="navbar">

<div class="container">

<a class="logo">
Feed<span>exx</span>
</a>

<a th:href="@{/logout}" class="btn btn-light">
Cerrar sesión
</a>

</div>

</nav>

<div class="container mt-5">

<h2 class="mb-4">

Bienvenido

<span th:text="${repartidor.usuario.nombre}"></span>

</h2>

<div class="card">

<div class="card-body">

<table class="table table-bordered table-hover">

<thead>

<tr>

<th>ID</th>

<th>Cliente</th>

<th>Ruta</th>

<th>Peso</th>

<th>Estado</th>

<th>Acción</th>

</tr>

</thead>

<tbody>

<tr th:each="envio : ${envios}">

<td th:text="${envio.idEnvio}"></td>

<td th:text="${envio.usuario != null ?envio.usuario.nombre + ' ' + envio.usuario.apellido :'Sin cliente'}"></td>

<td>

<span th:text="${envio.ruta.ciudadOrigen.nombre}"></span>

→

<span th:text="${envio.ruta.ciudadDestino.nombre}"></span>

</td>

<td th:text="${envio.peso}+' kg'"></td>

<td>

<span class="badge bg-primary"
th:if="${envio.estado=='EN_TRANSITO'}">

EN TRÁNSITO

</span>

<span class="badge bg-success"
th:if="${envio.estado=='ENTREGADO'}">

ENTREGADO

</span>

</td>

<td>

<form
th:if="${envio.estado=='EN_TRANSITO'}"
th:action="@{/repartidor/entregar}"
method="post">

<input
type="hidden"
name="idEnvio"
th:value="${envio.idEnvio}">

<button
class="btn btn-success btn-sm">

Marcar entregado

</button>

</form>

<span
th:if="${envio.estado=='ENTREGADO'}">

✅ Entregado

</span>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</body>

</html>
