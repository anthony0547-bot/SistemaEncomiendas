<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ocurrio un problema - Feedexx</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; }
        .navbar-feedexx { background-color: #4d148c; padding: 18px 40px; }
        .logo-feedexx { font-weight: 800; font-size: 1.6rem; color: #ffffff; text-decoration: none; }
        .logo-feedexx span { color: #ff6600; }
        .btn-naranja { background-color: #ff6600; border: none; color: white; font-weight: 700; }
        .btn-naranja:hover { background-color: #e65c00; color: white; }
    </style>
</head>
<body>

<nav class="navbar-feedexx d-flex align-items-center">
    <a th:href="@{/}" class="logo-feedexx">Feed<span>exx</span></a>
</nav>

<div class="container mt-5" style="max-width: 600px;">
    <div class="text-center mb-4">
        <div style="font-size: 3rem;">📦⚠️</div>
        <h3 class="mt-3" th:text="${tipoError} ?: 'Ocurrio un problema'"></h3>
    </div>

    <div class="alert alert-warning" th:text="${mensajeError} ?: 'Algo salio mal. Por favor intenta de nuevo.'"></div>

    <div class="d-grid gap-2">
        <a th:href="@{/}" class="btn btn-naranja">Volver al inicio</a>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">Regresar a la pagina anterior</a>
    </div>
</div>

</body>
<!-- Cambios en error.html -->
</html>
