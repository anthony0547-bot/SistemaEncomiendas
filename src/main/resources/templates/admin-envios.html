<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Administrar Envíos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f6fa;
    font-family:'Segoe UI',sans-serif;
}

.navbar{
    background:#4d148c;
}

.logo{
    color:white;
    font-size:28px;
    font-weight:bold;
    text-decoration:none;
}

.logo span{
    color:#ff6600;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.table th{
    background:#4d148c;
    color:white;
    text-align:center;
}

.table td{
    vertical-align:middle;
    text-align:center;
}

.btn-feedexx{
    background:#ff6600;
    color:white;
    border:none;
}

.btn-feedexx:hover{
    background:#e65c00;
    color:white;
}

.estado{
    padding:6px 14px;
    border-radius:20px;
    font-size:14px;
    font-weight:bold;
}

.registrado{
    background:#ffc107;
}

.transito{
    background:#0dcaf0;
}

.entregado{
    background:#198754;
    color:white;
}

</style>

</head>

<body>

<nav class="navbar">

<div class="container">

<a class="logo" th:href="@{/admin}">
Feed<span>exx</span>
</a>

<a th:href="@{/admin}" class="btn btn-light">
← Volver al Panel
</a>

</div>

</nav>

<div class="container mt-5">

<h2 class="mb-4">
Administración de Envíos
</h2>

<div class="card">

<div class="card-body">

<table class="table table-bordered table-hover">

<thead>

<tr>

<th>ID</th>
<th>Cliente</th>
<th>Ruta</th>
<th>Peso</th>
<th>Costo</th>
<th>Estado</th>
<th>Repartidor</th>
<th>Acción</th>

</tr>

</thead>

<tbody>

<tr th:each="envio : ${listarEnvios}">

<td th:text="${envio.idEnvio}"></td>

<td>
    <span th:if="${envio.usuario != null}"
          th:text="${envio.usuario.nombre + ' ' + envio.usuario.apellido}">
    </span>

    <span th:if="${envio.usuario == null}" class="text-danger">
        Sin cliente
    </span>
</td>

<td>

<span th:text="${envio.ruta.ciudadOrigen.nombre}"></span>

→

<span th:text="${envio.ruta.ciudadDestino.nombre}"></span>

</td>

<td th:text="${envio.peso} + ' kg'"></td>

<td th:text="'$ ' + ${envio.costo}"></td>

<td>

<span
th:if="${envio.estado=='REGISTRADO'}"
class="estado registrado">
REGISTRADO
</span>

<span
th:if="${envio.estado=='EN_TRANSITO'}"
class="estado transito">
EN TRÁNSITO
</span>

<span
th:if="${envio.estado=='ENTREGADO'}"
class="estado entregado">
ENTREGADO
</span>

</td>

<td>

<form
th:if="${envio.repartidor==null}"
th:action="@{/admin/envios/asignar}"
method="post">

<input
type="hidden"
name="idEnvio"
th:value="${envio.idEnvio}">

<select
name="idRepartidor"
class="form-select"
required>

<option value="">
Seleccione...
</option>

<option
th:each="r : ${listarRepartidores}"
th:value="${r.idRepartidor}"
th:text="${r.usuario.nombre}">
</option>

</select>

<button
class="btn btn-feedexx mt-2"
type="submit">

Asignar

</button>

</form>

<span
th:if="${envio.repartidor!=null}"
th:text="${envio.repartidor.usuario.nombre}">
</span>

</td>

<td>

<form
th:if="${envio.estado=='EN_TRANSITO'}"
th:action="@{/admin/envios/entregar}"
method="post">

<input
type="hidden"
name="idEnvio"
th:value="${envio.idEnvio}">

<button
class="btn btn-success btn-sm"
type="submit">

Marcar como entregado

</button>

</form>

<span
th:if="${envio.estado=='ENTREGADO'}">

✅ Entregado

</span>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</body>

</html>
