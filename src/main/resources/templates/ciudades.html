<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Ciudades</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Gestion de Ciudades (Nodos del Grafo)</h1>
    <a th:href="@{/}" class="btn btn-secondary btn-sm mb-3">&larr; Menu principal</a>

    <div class="row">
        <!-- FORMULARIO DE REGISTRO -->
        <div class="col-md-5">
            <div class="card">
                <div class="card-header">Registrar / Editar Ciudad</div>
                <div class="card-body">
                    <form th:action="@{/ciudades/guardar}" th:object="${ciudadNueva}" method="post">
                        <input type="hidden" th:field="*{idCiudad}">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" th:field="*{nombre}" placeholder="Ej: Guayaquil" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Provincia</label>
                            <input type="text" class="form-control" th:field="*{provincia}" placeholder="Ej: Guayas" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Latitud</label>
                            <input type="text" class="form-control" id="latitud" th:field="*{latitud}" readonly required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Longitud</label>
                            <input type="text" class="form-control" id="longitud" th:field="*{longitud}" readonly required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Seleccione la ubicacion en el mapa:</label>
                            <div id="mapa" style="width: 100%; height: 350px; border: 2px solid #ccc; border-radius: 6px;"></div>
                            <small class="text-muted">Arrastre el marcador rojo hasta el punto exacto de la ciudad.</small>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Guardar Ciudad</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- LISTADO -->
        <div class="col-md-7">
            <table class="table table-striped table-bordered">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Provincia</th>
                    <th>Lat</th>
                    <th>Lng</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="ciudad : ${listarCiudades}">
                    <td th:text="${ciudad.idCiudad}"></td>
                    <td th:text="${ciudad.nombre}"></td>
                    <td th:text="${ciudad.provincia}"></td>
                    <td th:text="${ciudad.latitud}"></td>
                    <td th:text="${ciudad.longitud}"></td>
                    <td>
                        <a th:href="@{/ciudades/editar/{id}(id=${ciudad.idCiudad})}" class="btn btn-sm btn-warning">Editar</a>
                        <a th:href="@{/ciudades/eliminar/{id}(id=${ciudad.idCiudad})}" class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Eliminar esta ciudad?');">Eliminar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Importar API de Google Maps (reemplaza TU_API_KEY por tu clave real) -->
<script async defer
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC7R1A1OsUEvONyYInmh2iHjcU6AEDN3iQ&libraries=places&callback=initMap"></script>

<script>
    let map;
    let marcador;
    // Coordenada inicial para centrar el mapa (Guayaquil, Ecuador)
    const coordenadaCentral = { lat: -2.170998, lng: -79.922359 };

    function initMap() {
        map = new google.maps.Map(document.getElementById("mapa"), {
            zoom: 12,
            center: coordenadaCentral
        });

        marcador = new google.maps.Marker({
            position: coordenadaCentral,
            map: map,
            title: "Arrastra hasta la ubicacion de la ciudad",
            draggable: true
        });

        // Si estamos editando una ciudad que ya tiene lat/lng guardados,
        // centramos el mapa y el marcador en esa posicion.
        const latExistente = document.getElementById("latitud").value;
        const lngExistente = document.getElementById("longitud").value;
        if (latExistente && lngExistente) {
            const posExistente = { lat: parseFloat(latExistente), lng: parseFloat(lngExistente) };
            map.setCenter(posExistente);
            marcador.setPosition(posExistente);
        }

        marcador.addListener("dragend", function (event) {
            const lat = event.latLng.lat();
            const lng = event.latLng.lng();
            document.getElementById("latitud").value = lat;
            document.getElementById("longitud").value = lng;
        });

        // Tambien permite hacer clic en cualquier punto del mapa para mover el marcador
        map.addListener("click", function (event) {
            const lat = event.latLng.lat();
            const lng = event.latLng.lng();
            marcador.setPosition(event.latLng);
            document.getElementById("latitud").value = lat;
            document.getElementById("longitud").value = lng;
        });
    }
</script>
</body>
</html>
