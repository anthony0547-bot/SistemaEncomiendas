<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Registro - Feedexx</title>

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<style>

body{
    background:#f5f5f5;
    font-family:Segoe UI;
}

.card{
    max-width:550px;
    margin:50px auto;
    border:none;
    border-radius:15px;
}

.btn-feedexx{
    background:#4d148c;
    color:white;
}

.btn-feedexx:hover{
    background:#3c0f6d;
    color:white;
}

.logo{
    text-align:center;
    font-size:35px;
    font-weight:bold;
    color:#4d148c;
}

.logo span{
    color:#ff6600;
}

</style>

</head>

<body>

<div class="card shadow p-4">

<div class="logo">
Feed<span>exx</span>
</div>

<h3 class="text-center mb-4">
Crear cuenta
</h3>

<form th:action="@{/registro}"
      th:object="${usuarioNuevo}"
      method="post">

<div class="mb-3">

<label>Nombre</label>

<input
type="text"
th:field="*{nombre}"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Apellido</label>

<input
type="text"
th:field="*{apellido}"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Correo</label>

<input
type="email"
th:field="*{correo}"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Contraseña</label>

<input
type="password"
th:field="*{contrasena}"
class="form-control"
required>

</div>

<button
class="btn btn-feedexx w-100">

Crear cuenta

</button>

</form>

<div class="text-center mt-4">

¿Ya tienes una cuenta?

<a th:href="@{/login}">

Iniciar sesión

</a>

</div>

</div>

</body>

</html>
