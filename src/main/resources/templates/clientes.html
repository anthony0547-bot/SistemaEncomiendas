<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion de Clientes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Gestion de Clientes</h1>
    <a th:href="@{/}" class="btn btn-secondary btn-sm mb-3">&larr; Menu principal</a>
    <div class="row">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header">Registrar / Editar Cliente</div>
                <div class="card-body">
                    <form th:action="@{/clientes/guardar}" th:object="${clienteNuevo}" method="post">
                        <input type="hidden" th:field="*{idCliente}">
                        <div class="mb-3">
                            <label class="form-label">Usuario asociado</label>
                            <select class="form-select" name="idUsuario" required>
                                <option th:each="u : ${listarUsuarios}"
                                        th:value="${u.idUsuario}"
                                        th:text="${u.nombre} + ' ' + ${u.apellido} + ' (' + ${u.correo} + ')'"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Cedula</label>
                            <input type="text" class="form-control" th:field="*{cedula}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Telefono</label>
                            <input type="text" class="form-control" th:field="*{telefono}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Direccion</label>
                            <textarea class="form-control" rows="2" th:field="*{direccion}" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Guardar</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-7">
            <table class="table table-striped table-bordered">
                <thead class="table-dark">
                <tr><th>ID</th><th>Nombre</th><th>Cedula</th><th>Telefono</th><th>Acciones</th></tr>
                </thead>
                <tbody>
                <tr th:each="c : ${listarClientes}">
                    <td th:text="${c.idCliente}"></td>
                    <td th:text="${c.usuario.nombre} + ' ' + ${c.usuario.apellido}"></td>
                    <td th:text="${c.cedula}"></td>
                    <td th:text="${c.telefono}"></td>
                    <td>
                        <a th:href="@{/clientes/editar/{id}(id=${c.idCliente})}" class="btn btn-sm btn-warning">Editar</a>
                        <a th:href="@{/clientes/eliminar/{id}(id=${c.idCliente})}" class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Eliminar?');">Eliminar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
